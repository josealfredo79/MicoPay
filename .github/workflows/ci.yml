name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run ESLint
        run: npm run lint
        working-directory: apps/api

      - name: Build
        run: npm run build
        working-directory: apps/api

      - name: Run Tests
        run: npm test
        working-directory: apps/api

  contracts:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Check Contracts
        run: cargo check
        working-directory: contracts/micopay-escrow
