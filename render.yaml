services:
  # ── MicoPay Protocol API (x402 + Soroban HTLC) ────────────────────────────
  - type: web
    name: micopay-api
    runtime: node
    rootDir: apps/api
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: STELLAR_RPC_URL
        value: https://soroban-testnet.stellar.org
      - key: STELLAR_NETWORK
        value: TESTNET
      - key: ESCROW_CONTRACT_ID
        value: CBQINHLR3M7NZAPQY7EJ3TWOE22R57LMFDVEMOK3C3X7ZIBFWHVQQP3A
      - key: ATOMIC_SWAP_CONTRACT_A
        value: CCDOUXIXSFXT2HTJAJGFNUJN6CKCYX2M6AL2BHHPEF6ISNHP2BGLS4KX
      - key: ATOMIC_SWAP_CONTRACT_B
        value: CBLCGG44QQILWEIVBXDSZSLH7NI7SGJQKXQ7WTKP3W3YSXOBTGMZKSNN
      - key: USDC_ISSUER
        value: GBBD47IF6LWK7P7MDEVSCWR7DPUWV3NY3DTQEVFL4NAT4AQH3ZLLFLA5
      - key: MOCK_STELLAR
        value: "false"
      # Set these as secret env vars in the Render dashboard:
      - key: PLATFORM_SECRET_KEY
        sync: false
      - key: DEMO_AGENT_SECRET_KEY
        sync: false
      - key: DEMO_AGENT_PUBLIC_KEY
        sync: false

  # ── MicoPay P2P Backend (mobile app backend) ───────────────────────────────
  - type: web
    name: micopay-backend
    runtime: node
    rootDir: micopay/backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3002
      - key: STELLAR_RPC_URL
        value: https://soroban-testnet.stellar.org
      - key: STELLAR_NETWORK
        value: TESTNET
      - key: MOCK_STELLAR
        value: "false"
      - key: ESCROW_CONTRACT_ID
        value: CB4M5777YFQWKGDUULCX5W6PXEDJSJARDTMH4VV6FXC4W4UPANALO3HZ
      - key: MXNE_CONTRACT_ID
        value: CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC
      - key: MXNE_ISSUER_ADDRESS
        value: GBZXN7PIRZGNMHGA7MUUUF4GWMTISGNQ5E72TFL6GDWPE6K4RCAVOALV
      # Set these as secret env vars in the Render dashboard:
      - key: PLATFORM_SECRET_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
