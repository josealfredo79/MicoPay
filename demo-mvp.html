<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MicoPay - Demo MVP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .chat-container { height: calc(100vh - 200px); }
    .chat-messages { scroll-behavior: smooth; }
    .typing { animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .message-bot { background: #1f2937; }
    .message-user { background: #065f46; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  
  <!-- Header -->
  <header class="bg-gray-800 border-b border-gray-700 px-6 py-4">
    <div class="max-w-4xl mx-auto flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold text-green-400">MicoPay</h1>
        <p class="text-gray-400 text-sm">Convierte efectivo a digital</p>
      </div>
      <div class="flex items-center gap-4">
        <a href="http://localhost:5185" target="_blank" class="bg-emerald-600 hover:bg-emerald-700 px-4 py-2 rounded-lg font-bold text-sm flex items-center gap-2">
          <span class="material-symbols-outlined text-lg">open_in_new</span>
          Probar App
        </a>
        <div class="text-right">
          <span id="api-status" class="text-green-400 text-sm">● En vivo</span>
          <p class="text-gray-500 text-xs">Demo conversacional</p>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto p-6">
    
    <!-- Info Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
        <p class="text-gray-400 text-sm mb-1">Red</p>
        <p class="text-xl font-bold text-blue-400">Pruebas</p>
      </div>
      <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
        <p class="text-gray-400 text-sm mb-1">Cambio</p>
        <p class="text-xl font-bold text-green-400">$1 USD = $17.50 MXN</p>
      </div>
      <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
        <p class="text-gray-400 text-sm mb-1">Modo</p>
        <p class="text-xl font-bold text-purple-400">Demo</p>
      </div>
    </div>

    <!-- Chat Interface -->
    <div class="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden">
      <div class="bg-gray-900 px-4 py-3 border-b border-gray-700">
        <h2 class="font-bold">💬 MicoPay Bot</h2>
      </div>
      
      <div id="chat-messages" class="chat-container overflow-y-auto p-4 space-y-4">
        <!-- Messages will appear here -->
      </div>

      <!-- Input -->
      <div class="border-t border-gray-700 p-4 bg-gray-900">
        <div class="flex gap-2">
          <input 
            type="text" 
            id="user-input" 
            placeholder="Escribe tu mensaje..."
            class="flex-1 bg-gray-800 border border-gray-600 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-green-500"
            onkeypress="handleKeyPress(event)"
          >
          <button 
            onclick="sendMessage()"
            class="bg-green-600 hover:bg-green-700 px-6 py-3 rounded-lg font-bold"
          >
            Enviar
          </button>
        </div>
        
        <!-- Quick Actions -->
        <div class="flex flex-wrap gap-2 mt-3">
          <button onclick="quickCommand('/start')" class="bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded text-sm">/start</button>
          <button onclick="quickCommand('/ayuda')" class="bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded text-sm">/ayuda</button>
          <button onclick="quickCommand('/estado')" class="bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded text-sm">/estado</button>
          <button onclick="quickCommand('/tasa')" class="bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded text-sm">/tasa</button>
          <button onclick="quickCommand('/agentes')" class="bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded text-sm">/agentes</button>
          <button onclick="quickCommand('/solicitar')" class="bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded text-sm">/solicitar</button>
        </div>
      </div>
    </div>

    <!-- API Response -->
    <div class="mt-6">
      <h3 class="font-bold mb-2">📡 API Response</h3>
      <pre id="api-response" class="bg-black rounded-lg p-4 text-green-400 text-sm overflow-auto max-h-48">Click a command to see the API response...</pre>
    </div>

  </main>

  <script>
    const API = 'http://localhost:3000';
    
    // Sample agents data
    const agents = [
      { id: 'GM001', name: 'Farmacia Guadalupe', address: 'Roma Norte, CDMX', distance_km: 0.5, available_mxn: 5000, tier: 'maestro', reputation: 0.98, online: true },
      { id: 'GM002', name: 'Tienda Don Pepe', address: 'Condesa, CDMX', distance_km: 1.2, available_mxn: 3000, tier: 'experto', reputation: 0.93, online: true },
      { id: 'GM003', name: 'Papelería Central', address: 'Del Valle, CDMX', distance_km: 2.1, available_mxn: 2000, tier: 'activo', reputation: 0.88, online: true },
    ];

    const cetesData = { apy: 5.6, cesPriceMxn: 1.157565, xlmPerUsdc: 17.5 };

    function addMessage(text, isUser = false) {
      const chat = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = `p-3 rounded-xl ${isUser ? 'message-user ml-8' : 'message-bot mr-8'}`;
      div.innerHTML = `<p class="whitespace-pre-wrap">${text}</p>`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function addTyping() {
      const chat = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.id = 'typing';
      div.className = 'message-bot mr-8 p-3 rounded-xl';
      div.innerHTML = '<span class="typing">●●●</span>';
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
      const typing = document.getElementById('typing');
      if (typing) typing.remove();
    }

    async function sendMessage() {
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text) return;
      
      addMessage(text, true);
      input.value = '';
      
      addTyping();
      await new Promise(r => setTimeout(r, 800 + Math.random() * 500));
      removeTyping();
      
      await processCommand(text);
    }

    async function processCommand(cmd) {
      const command = cmd.toLowerCase().trim();
      let response = '';
      let apiData = null;

      switch(command) {
        case '/start':
          response = `👋 *¡Bienvenido a MicoPay!*

Convierte tu dinero en efectivo de forma fácil y segura.

*¿Qué puedes hacer?*
• /ayuda - Ver todas las opciones
• /estado - Ver cómo funciona
• /agentes - Ver puntos cercanos
• /tasa - Ver tipo de cambio
• /solicitar - Pedir efectivo

💰 *Funcciona así:*
1. Tus pesos se convierten a dólares digitales
2. Un agente cercano te da el efectivo
3. Sin necesidad de banco

¡Pruébalo! 🚀`;
          apiData = { command: '/start' };
          break;

        case '/ayuda':
        case '/help':
          response = `📚 *Ayuda*

/start - Bienvenida
/estado - Cómo funciona
/agentes - Puntos de retiro cerca de ti
/tasa - Tipo de cambio actual
/solicitar - Pedir efectivo`;
          apiData = { command: '/ayuda' };
          break;

        case '/estado':
          addMessage('⏳ Verificando sistema...');
          try {
            const res = await fetch(API + '/health');
            apiData = await res.json();
            response = `✅ *MicoPay está activo*

Todo funcionando correctamente.
Podrás usar la app cuando esté lista.`;
          } catch (e) {
            response = '❌ El servidor no responde. Intenta más tarde.';
            apiData = { error: e.message };
          }
          break;

case '/tasa':
        case '/rate':
          addMessage('⏳ Obteniendo tipo de cambio...');
          try {
            const res = await fetch(API + '/defi/cetes/rate');
            apiData = await res.json();
            response = `💱 *Tasa de Cambio*

*1 dólar = $${apiData.cesPriceMxn * 17.5} MXN*
*Rendimiento CETES: ${apiData.apy}%*

_Last update: ${new Date().toISOString()}_`;
          } catch (e) {
            response = '❌ Error al obtener tasas. Usando datos simulados.\n\n💱 *Tasa de Cambio (Simulada)*\n\n*1 dólar = $17.50 MXN*';
            apiData = cetesData;
          }
          break;

        case '/agentes':
        case '/agents':
          addMessage('⏳ Buscando puntos de retiro...');
          response = `🏪 *Puntos de Retiro Cercanos* (${agents.length})

*Tipo de cambio:* $1 USD = $17.50 MXN

${agents.map((a, i) => `${i+1}. *${a.name}* ${a.online ? '✅' : '❌'}
   📍 ${a.address}
   🚗 A ${a.distance_km} km
   💵 Hasta: $${a.available_mxn.toLocaleString()} MXN
   ⭐好评: ${(a.reputation * 100).toFixed(0)}%`).join('\n\n')}

_Elige un punto para continuar_`;
          apiData = { agents };
          break;

        case '/demo':
        case '/solicitar':
        case '/request':
          response = `💰 *Solicitar Efectivo*

*Cantidad:* $1,000 MXN
*Equivalente:* 57.14 USD (dólares digitales)
*Punto:* Farmacia Guadalupe
*Comisión:* $5 MXN (0.5%)

*¿Cómo funciona?*
1. Tus pesos se convierten a dólares digitales
2. El agente recibe el dinero en su cuenta
3. Te da el efectivo en persona

¿Confirmas? (escribe "sí")`;
          apiData = { 
            amount_mxn: 1000,
            amount_usdc: 57.14,
            agent: 'Farmacia Guadalupe',
            commission: 5
          };
          break;

        case 'sí':
        case 'si':
        case 'si, confirmar':
          response = `✅ *Operación Confirmada*

Txn Hash: \`demo_txn_1234567890\`
Monto: 57.14 dólares → $1,000 MXN
Estado: ✅ Completado

¡Gracias por usar MicoPay! 🎉`;
          apiData = { status: 'completed', demo: true };
          break;

        default:
          response = `No entendí tu mensaje. 

Usa /help para ver los comandos disponibles.`;
          apiData = { error: 'unknown_command', input: command };
      }

      if (response) addMessage(response);
      document.getElementById('api-response').textContent = JSON.stringify(apiData, null, 2);
    }

    function quickCommand(cmd) {
      document.getElementById('user-input').value = cmd;
      sendMessage();
    }

    function handleKeyPress(e) {
      if (e.key === 'Enter') sendMessage();
    }

    // Initial welcome message
    window.onload = function() {
      addMessage(`👋 *¡Bienvenido a MicoPay!*

Este es un *demo* para que veas cómo funcionaría el chat de Telegram.

💰 *¿Qué hace MicoPay?*
Convierte tu efectivo en dinero digital (y al revés) sin necesidad de banco.

📱 *Prueba la App completa:*
👉 http://localhost:5185

Ahí puedes:
- Crear tu cuenta fácil
- Depositar efectivo en puntos cercanos
- Convertir a efectivo
- Invertir y ganar rendimientos
- Y más...

💬 *Usa los comandos de abajo* para probar el chat:
/start - Comenzar
/ayuda - Ver opciones
/agentes - Ver puntos cerca de ti
/tasa - Ver tipo de cambio`);
      checkApiStatus();
    };
    const statusEl = document.getElementById('api-status');
      try {
        await fetch(API + '/health');
        statusEl.textContent = '● Conectado';
        statusEl.className = 'text-green-400 text-sm';
      } catch {
        statusEl.textContent = '● Modo Demo';
        statusEl.className = 'text-yellow-400 text-sm';
      }
    }

    // Initialize
    checkApiStatus();
    setTimeout(() => {
      addMessage(`👋 *¡Hola! Soy MicoPay*

Soy un chat de demostración. Así se sentiría usar el bot de Telegram.

*Prueba estos comandos:*
• /start - Comenzar
• /ayuda - Ver todas las opciones
• /agentes - Ver puntos de retiro cerca
• /tasa - Ver tipo de cambio
• /solicitar - Pedir efectivo

O usa los botones de abajo.`, false);
    }, 500);
  </script>
</body>
</html>
